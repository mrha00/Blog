name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore BlogApi.IntegrationTests/BlogApi.IntegrationTests.csproj

      - name: Build
        run: dotnet build BlogApi.IntegrationTests/BlogApi.IntegrationTests.csproj --no-restore -c Release

      - name: Integration tests
        run: dotnet test BlogApi.IntegrationTests/BlogApi.IntegrationTests.csproj --no-build -c Release --verbosity normal
