name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore BlogApi.API/BlogApi.API.csproj
      - run: dotnet build BlogApi.API/BlogApi.API.csproj --no-restore -c Release
      - run: dotnet test BlogApi.API.Tests/BlogApi.API.Tests.csproj -c Release
      - run: dotnet test BlogApi.Services.Tests/BlogApi.Services.Tests.csproj -c Release

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blogweb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: blogweb/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
